<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Quiz Pro</title>
    <style>
        :root { --primary: #4361ee; --success: #4cc9f0; --error: #f72585; --dark: #1f2937; }
        body { font-family: 'Pretendard', sans-serif; background: #f3f4f6; color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 650px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .score-board { display: flex; justify-content: space-between; background: var(--dark); color: white; padding: 15px 25px; border-radius: 16px; margin-bottom: 20px; font-weight: 600; }
        .score-board span { color: #fbbf24; }
        .badge { display: inline-block; background: #e5e7eb; padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
        canvas { background: #fff; border: 2px solid #f3f4f6; border-radius: 16px; width: 100%; height: auto; margin-bottom: 20px; }
        .quiz-container { background: #f9fafb; padding: 25px; border-radius: 20px; text-align: center; }
        .question-text { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
        .input-group { display: flex; gap: 10px; justify-content: center; align-items: center; }
        input { width: 100px; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 18px; text-align: center; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
        button { cursor: pointer; border: none; font-weight: 700; transition: 0.2s; }
        .btn-check { background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; font-size: 16px; }
        .btn-check:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-next { background: #6b7280; color: white; padding: 10px 20px; border-radius: 12px; margin-top: 15px; width: 100%; }
        #feedback { margin-top: 15px; height: 24px; font-weight: 600; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <div class="score-board">
        <div>현재 점수: <span id="currentScore">0</span></div>
        <div>최고 점수: <span id="highScore">0</span></div>
    </div>

    <div id="modeBadge" class="badge">직렬 회로</div>
    
    <canvas id="quizCanvas" width="600" height="300"></canvas>

    <div class="quiz-container">
        <div id="questionArea" class="question-text">질문 만드는 중..</div>
        <div class="input-group">
            <input type="text" id="userAnswer" placeholder="">
            <span id="unitText">A</span>
            <button class="btn-check" onclick="checkAnswer()">제출</button>
        </div>
        <div id="feedback"></div>
    </div>

    <button class="btn-next" onclick="generateQuiz()">새로운 문제 가져오기</button>
</div>

<script src="script.js"></script>
</body>
</html>
